<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandbox Assault Shooter - Pro Edition</title>
<style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; text-align: center; overflow: hidden; }
    #ui { padding: 10px; background: #222; display: flex; justify-content: space-around; }
    canvas { background: #000; display: block; margin: auto; border: 2px solid #444; }
    
    #inventory {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
    }
    .slot {
        width: 70px;
        height: 70px;
        background: #333;
        border: 2px solid #555;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 10px;
        color: #777;
    }
    .slot.owned { border-color: #888; color: #ccc; }
    .slot.selected { 
        border-color: #fff !important; 
        box-shadow: 0 0 15px rgba(255,255,255,0.5);
        color: white !important;
        background: #555;
    }

    #shop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .shop-btn { margin: 10px; padding: 12px 20px; background: #333; color: white; border: 1px solid #777; cursor: pointer; }
</style>
</head>
<body>

<div id="ui">
    <div>Health: <span id="health">100</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Wave: <span id="wave">1</span></div>
    <div>Active: <b id="current-weapon-text">Pistol</b></div>
</div>

<div id="inventory">
    <div id="slot-0" class="slot owned selected"><span>PISTOL</span></div>
    <div id="slot-1" class="slot"><span>SMG</span></div>
    <div id="slot-2" class="slot"><span>SHOTGUN</span></div>
</div>

<div id="shop">
    <h1>SHOP</h1>
    <p>Points: <span id="shopScore">0</span></p>
    <button class="shop-btn" onclick="buyWeapon(1)">Buy SMG (300)</button>
    <button class="shop-btn" onclick="buyWeapon(2)">Buy Shotgun (450)</button>
    <button class="shop-btn" onclick="closeShop()">Continue</button>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Spill-stats
let health = 100;
let score = 0;
let wave = 1;
let shopOpen = false;

// Våpen-system
let selectedWeaponIndex = 0;
const weaponNames = ["Pistol", "SMG", "Shotgun"];
const ownedWeapons = [true, false, false]; // Pistol er eid fra start
let lastShotTime = 0;

const player = { x: 400, y: 250, size: 20, speed: 4 };
const bullets = [];
const enemies = [];
const keys = {};

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    keys[e.code] = true;

    // Våpenvalg med piltaster
    if (e.code === "ArrowRight") switchWeapon(1);
    if (e.code === "ArrowLeft") switchWeapon(-1);
    
    // Skyting
    if (e.key.toLowerCase() === 'e') shoot();
});
window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
    keys[e.code] = false;
});

function switchWeapon(dir) {
    let next = selectedWeaponIndex + dir;
    if (next >= 0 && next < 3 && ownedWeapons[next]) {
        selectedWeaponIndex = next;
        updateUI();
    }
}

function shoot() {
    if (shopOpen || health <= 0) return;
    const now = Date.now();
    
    // Finn nærmeste fiende for auto-aim
    let targetAngle = -Math.PI/2;
    if (enemies.length > 0) {
        let closest = enemies.reduce((prev, curr) => 
            Math.hypot(curr.x - player.x, curr.y - player.y) < Math.hypot(prev.x - player.x, prev.y - player.y) ? curr : prev
        );
        targetAngle = Math.atan2(closest.y - player.y, closest.x - player.x);
    }

    // PISTOL
    if (selectedWeaponIndex === 0) {
        if (now - lastShotTime < 400) return;
        createBullet(player.x, player.y, targetAngle, 8, 10, Infinity);
        lastShotTime = now;
    } 
    // SMG
    else if (selectedWeaponIndex === 1) {
        if (now - lastShotTime < 200) return; // 0.2 sek cooldown
        for (let i = 0; i < 6; i++) {
            setTimeout(() => {
                const spread = (Math.random() - 0.5) * (Math.PI / 36); // 5 grader spredning
                createBullet(player.x, player.y, targetAngle + spread, 40, 5, Infinity);
            }, i * 30);
        }
        lastShotTime = now;
    }
    // SHOTGUN
    else if (selectedWeaponIndex === 2) {
        if (now - lastShotTime < 800) return;
        const bulletCount = 12;
        const spreadArc = Math.PI / 3; // 60 grader vifte
        for (let i = 0; i < bulletCount; i++) {
            const angle = (targetAngle - spreadArc/2) + (Math.random() * spreadArc);
            // Hastighet: 20x SMG (40*20 = 800), Levetid: 3.5 fiender avstand (ca 70-80px)
            createBullet(player.x, player.y, angle, 40, 50, 80); 
        }
        lastShotTime = now;
    }
}

function createBullet(x, y, angle, speed, dmg, range) {
    bullets.push({ 
        x, y, angle, speed, dmg, 
        startX: x, startY: y, range 
    });
}

function buyWeapon(idx) {
    const prices = [0, 300, 450];
    if (score >= prices[idx] && !ownedWeapons[idx]) {
        score -= prices[idx];
        ownedWeapons[idx] = true;
        document.getElementById(`slot-${idx}`).classList.add("owned");
        updateUI();
    }
}

function closeShop() {
    shopOpen = false;
    document.getElementById("shop").style.display = "none";
    wave++;
}

function updateUI() {
    document.getElementById("health").innerText = health;
    document.getElementById("score").innerText = score;
    document.getElementById("shopScore").innerText = score;
    document.getElementById("wave").innerText = wave;
    document.getElementById("current-weapon-text").innerText = weaponNames[selectedWeaponIndex];
    
    // Oppdater inventar-klasser
    for (let i = 0; i < 3; i++) {
        const el = document.getElementById(`slot-${i}`);
        el.classList.remove("selected");
        if (i === selectedWeaponIndex) el.classList.add("selected");
    }
}

function update() {
    if (shopOpen || health <= 0) return;

    if (keys['w'] && player.y > 0) player.y -= player.speed;
    if (keys['s'] && player.y < canvas.height) player.y += player.speed;
    if (keys['a'] && player.x > 0) player.x -= player.speed;
    if (keys['d'] && player.x < canvas.width) player.x += player.speed;

    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        
        const distTravelled = Math.hypot(b.x - b.startX, b.y - b.startY);
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height || distTravelled > b.range) {
            bullets.splice(i, 1);
        }
    });

    enemies.forEach((en, i) => {
        const angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(angle) * (1 + wave * 0.1);
        en.y += Math.sin(angle) * (1 + wave * 0.1);

        if (Math.hypot(player.x - en.x, player.y - en.y) < 20) {
            health -= 1;
            enemies.splice(i, 1);
            updateUI();
        }

        bullets.forEach((b, bi) => {
            if (Math.hypot(en.x - b.x, en.y - b.y) < 15) {
                en.hp -= b.dmg;
                bullets.splice(bi, 1);
                if (en.hp <= 0) {
                    enemies.splice(i, 1);
                    score += 50;
                    updateUI();
                    if (score > 0 && score % 600 === 0) {
                        shopOpen = true;
                        document.getElementById("shop").style.display = "flex";
                    }
                }
            }
        });
    });

    if (Math.random() < 0.02 + (wave * 0.005)) {
        enemies.push({ x: Math.random()*800, y: -20, hp: 15 });
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Tegn spiller
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x - 10, player.y - 10, 20, 20);

    // Tegn kuler
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 3, 0, Math.PI*2);
        ctx.fill();
    });

    // Tegn fiender
    enemies.forEach(en => {
        ctx.fillStyle = "red";
        ctx.fillRect(en.x - 10, en.y - 10, 20, 20);
        // HP bar liten
        ctx.fillStyle = "green";
        ctx.fillRect(en.x - 10, en.y - 15, (en.hp/15)*20, 3);
    });

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
