<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandbox Assault Shooter</title>
<style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; text-align: center; overflow: hidden; }
    #ui { padding: 10px; background: #222; display: flex; justify-content: space-around; flex-wrap: wrap; }
    canvas { background: #000; display: block; margin: auto; border: 2px solid #444; cursor: crosshair; }
    #shop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .shop-btn { margin: 10px; padding: 12px 20px; background: #333; color: white; border: 1px solid #777; cursor: pointer; }
    .shop-btn:hover { background: #555; }
</style>
</head>
<body>

<div id="ui">
    <div>Health: <span id="health">100</span></div>
    <div>Weapon: <span id="weapon">Pistol</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Wave: <span id="wave">1</span></div>
</div>

<div id="shop">
    <h1>SHOP</h1>
    <p>Your Score: <span id="shopScore">0</span></p>
    <button class="shop-btn" onclick="buyWeapon('SMG')">Buy SMG (300) | Stacks: <span id="smgStacks">0</span></button>
    <button class="shop-btn" onclick="buyWeapon('Shotgun')">Buy Shotgun (450) | Stacks: <span id="shotgunStacks">0</span></button>
    <button class="shop-btn" onclick="closeShop()">Continue</button>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Spill-tilstand
let health = 100;
let score = 0;
let wave = 1;
let shopOpen = false;
let weaponType = 'Pistol';
let smgStacks = 0;
let shotgunStacks = 0;

// Objekter
const player = { x: 400, y: 250, size: 20, speed: 4 };
const bullets = [];
const enemies = [];
const keys = {};

// Input-håndtering
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener("mousedown", shoot);

function shoot(e) {
    if (shopOpen) return;
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);

    bullets.push({ x: player.x, y: player.y, angle: angle, speed: 7 });
}

function spawnEnemy() {
    if (shopOpen) return;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = Math.random() * canvas.width; y = -20; }
    else if (side === 1) { x = canvas.width + 20; y = Math.random() * canvas.height; }
    else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + 20; }
    else { x = -20; y = Math.random() * canvas.height; }
    enemies.push({ x, y, size: 20, speed: 1 + (wave * 0.2) });
}

function buyWeapon(type) {
    if (type === 'SMG' && score >= 300) {
        score -= 300;
        smgStacks++;
        weaponType = 'SMG';
    } else if (type === 'Shotgun' && score >= 450) {
        score -= 450;
        shotgunStacks++;
        weaponType = 'Shotgun';
    }
    updateUI();
}

function closeShop() {
    shopOpen = false;
    document.getElementById("shop").style.display = "none";
    wave++;
    updateUI();
}

function updateUI() {
    document.getElementById("health").innerText = health;
    document.getElementById("score").innerText = score;
    document.getElementById("shopScore").innerText = score;
    document.getElementById("wave").innerText = wave;
    document.getElementById("weapon").innerText = weaponType;
    document.getElementById("smgStacks").innerText = smgStacks;
    document.getElementById("shotgunStacks").innerText = shotgunStacks;
}

function update() {
    if (shopOpen || health <= 0) return;

    // Bevegelse
    if (keys['w'] && player.y > 0) player.y -= player.speed;
    if (keys['s'] && player.y < canvas.height) player.y += player.speed;
    if (keys['a'] && player.x > 0) player.x -= player.speed;
    if (keys['d'] && player.x < canvas.width) player.x += player.speed;

    // Kuler
    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    // Fiender
    enemies.forEach((en, i) => {
        const angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(angle) * en.speed;
        en.y += Math.sin(angle) * en.speed;

        // Kollisjon med spiller
        const dist = Math.hypot(player.x - en.x, player.y - en.y);
        if (dist < 20) {
            health -= 10;
            enemies.splice(i, 1);
            updateUI();
            if (health <= 0) alert("Game Over! Score: " + score);
        }

        // Kollisjon med kuler
        bullets.forEach((b, bi) => {
            if (Math.hypot(en.x - b.x, en.y - b.y) < 15) {
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 10;
                updateUI();
                if (score % 500 === 0) { shopOpen = true; document.getElementById("shop").style.display = "flex"; }
            }
        });
    });

    if (Math.random() < 0.02) spawnEnemy();
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Tegn spiller
    ctx.fillStyle = "white";
    ctx.fillRect(player.x - 10, player.y - 10, 20, 20);

    // Tegn kuler
    ctx.fillStyle = "yellow";
    bullets.forEach(b => ctx.fillRect(b.x - 2, b.y - 2, 4, 4));

    // Tegn fiender
    ctx.fillStyle = "red";
    enemies.forEach(en => ctx.fillRect(en.x - 10, en.y - 10, 20, 20));

    requestAnimationFrame(() => {
        update();
        draw();
    });
}

draw();
</script>
</body>
</html>
