<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sandbox Assault Shooter</title>
<style>
    body { margin: 0; background: #111; color: white; font-family: Arial, sans-serif; text-align: center; overflow: hidden; }
    #ui { padding: 10px; background: #222; display: flex; justify-content: space-around; }
    canvas { background: #000; display: block; margin: auto; border: 2px solid #444; }
    
    /* Inventar-system nederst til venstre */
    #inventory {
        position: absolute;
        bottom: 20px;
        left: 20px;
        display: flex;
        gap: 10px;
    }
    .slot {
        width: 60px;
        height: 60px;
        background: #333;
        border: 2px solid #555;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        font-size: 10px;
        color: #777;
    }
    .slot.active {
        border-color: #00ff00;
        color: white;
        background: #444;
    }

    #shop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
    .shop-btn { margin: 10px; padding: 12px 20px; background: #333; color: white; border: 1px solid #777; cursor: pointer; }
</style>
</head>
<body>

<div id="ui">
    <div>Health: <span id="health">100</span></div>
    <div>Score: <span id="score">0</span></div>
    <div>Wave: <span id="wave">1</span></div>
</div>

<div id="inventory">
    <div id="slot-pistol" class="slot active"><span>PISTOL</span></div>
    <div id="slot-smg" class="slot"><span>SMG</span></div>
    <div id="slot-shotgun" class="slot"><span>SHOTGUN</span></div>
</div>

<div id="shop">
    <h1>SHOP</h1>
    <p>Points: <span id="shopScore">0</span></p>
    <button class="shop-btn" onclick="buyWeapon('SMG')">Buy SMG (300)</button>
    <button class="shop-btn" onclick="buyWeapon('Shotgun')">Buy Shotgun (450)</button>
    <button class="shop-btn" onclick="closeShop()">Continue</button>
</div>

<canvas id="game" width="800" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let health = 100;
let score = 0;
let wave = 1;
let shopOpen = false;
let ownedWeapons = { pistol: true, smg: false, shotgun: false };

const player = { x: 400, y: 250, size: 20, speed: 4 };
const bullets = [];
const enemies = [];
const keys = {};

// Sikte-koordinater (brukes for å vite hvilken vei vi skyter med E)
let mouseX = 0;
let mouseY = 0;

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    // Sjekk om spilleren trykker "E" for å skyte
    if (e.key.toLowerCase() === 'e') {
        shoot();
    }
});
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
canvas.addEventListener("mousemove", e => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left;
    mouseY = e.clientY - rect.top;
});

function shoot() {
    if (shopOpen || health <= 0) return;
    const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
    bullets.push({ x: player.x, y: player.y, angle: angle, speed: 8 });
}

function buyWeapon(type) {
    if (type === 'SMG' && score >= 300) {
        score -= 300;
        ownedWeapons.smg = true;
        document.getElementById("slot-smg").classList.add("active");
    } else if (type === 'Shotgun' && score >= 450) {
        score -= 450;
        ownedWeapons.shotgun = true;
        document.getElementById("slot-shotgun").classList.add("active");
    }
    updateUI();
}

function closeShop() {
    shopOpen = false;
    document.getElementById("shop").style.display = "none";
    wave++;
    updateUI();
}

function updateUI() {
    document.getElementById("health").innerText = health;
    document.getElementById("score").innerText = score;
    document.getElementById("shopScore").innerText = score;
    document.getElementById("wave").innerText = wave;
}

function update() {
    if (shopOpen || health <= 0) return;

    if (keys['w'] && player.y > 0) player.y -= player.speed;
    if (keys['s'] && player.y < canvas.height) player.y += player.speed;
    if (keys['a'] && player.x > 0) player.x -= player.speed;
    if (keys['d'] && player.x < canvas.width) player.x += player.speed;

    bullets.forEach((b, i) => {
        b.x += Math.cos(b.angle) * b.speed;
        b.y += Math.sin(b.angle) * b.speed;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    enemies.forEach((en, i) => {
        const angle = Math.atan2(player.y - en.y, player.x - en.x);
        en.x += Math.cos(angle) * (1 + wave * 0.1);
        en.y += Math.sin(angle) * (1 + wave * 0.1);

        if (Math.hypot(player.x - en.x, player.y - en.y) < 20) {
            health -= 5;
            enemies.splice(i, 1);
            updateUI();
        }

        bullets.forEach((b, bi) => {
            if (Math.hypot(en.x - b.x, en.y - b.y) < 15) {
                enemies.splice(i, 1);
                bullets.splice(bi, 1);
                score += 50;
                updateUI();
                if (score % 600 === 0) { 
                    shopOpen = true; 
                    document.getElementById("shop").style.display = "flex"; 
                }
            }
        });
    });

    if (Math.random() < 0.02) {
        enemies.push({ x: Math.random() * 800, y: -20 });
    }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Spiller
    ctx.fillStyle = "cyan";
    ctx.fillRect(player.x - 10, player.y - 10, 20, 20);

    // Kuler
    ctx.fillStyle = "white";
    bullets.forEach(b => ctx.beginPath() || ctx.arc(b.x, b.y, 3, 0, Math.PI*2) || ctx.fill());

    // Fiender
    ctx.fillStyle = "red";
    enemies.forEach(en => ctx.fillRect(en.x - 10, en.y - 10, 20, 20));

    requestAnimationFrame(draw);
    update();
}

draw();
</script>
</body>
</html>
